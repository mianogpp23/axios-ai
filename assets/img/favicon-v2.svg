<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <!-- Sfondo scuro e futuristico coerente con l'hub medico -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1931" />
      <stop offset="100%" stop-color="#020c1b" />
    </radialGradient>

    <!-- Gradiente Oro/Neon per la scritta principale -->
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#ffe082" />
      <stop offset="100%" stop-color="#ffb300" />
    </linearGradient>

    <!-- Bagliore azzurro olografico per i dettagli -->
    <linearGradient id="cyanTech" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#00a8ff" />
    </linearGradient>

    <!-- Filtro Glow per l'effetto luce dei display nei reference -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Sfondo dell'icona -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)" />

  <!-- Dettaglio Tech/Medico (Cornice sottile ai bordi) -->
  <rect x="3" y="3" width="58" height="58" rx="11" fill="none" stroke="url(#cyanTech)" stroke-width="1" opacity="0.4" />
  
  <!-- Scrittura geometrica "ΑΞΙΟΣ" disposta su due righe per massima leggibilità in 64x64px -->
  <g filter="url(#textGlow)" fill="url(#goldText)" stroke-linejoin="round" stroke-linecap="round">
    
    <!-- RIGA 1: Α Ξ (Spessore 3.5px per essere visibile da lontano) -->
    <!-- Alpha (Α) -->
    <path d="M 12,28 L 20,10 L 28,28" fill="none" stroke="url(#goldText)" stroke-width="3.5" />
    <line x1="15.5" y1="21" x2="24.5" y2="21" stroke="url(#goldText)" stroke-width="3" />

    <!-- Xi (Ξ) -->
    <line x1="36" y1="10" x2="48" y2="10" stroke="url(#goldText)" stroke-width="3.5" />
    <line x1="39" y1="18.5" x2="45" y2="18.5" stroke="url(#goldText)" stroke-width="3.5" />
    <line x1="36" y1="27" x2="48" y2="27" stroke="url(#goldText)" stroke-width="3.5" />


    <!-- RIGA 2: I Ο Σ -->
    <!-- Iota (Ι) -->
    <line x1="15" y1="38" x2="15" y2="54" stroke="url(#goldText)" stroke-width="3.5" />

    <!-- Omicron (Ο) -->
    <ellipse cx="32" cy="46" rx="7" ry="8" fill="none" stroke="url(#goldText)" stroke-width="3.5" />

    <!-- Sigma (Σ) -->
    <path d="M 53,38 L 43,38 L 49,46 L 43,54 L 53,54" fill="none" stroke="url(#goldText)" stroke-width="3.5" />

  </g>

  <!-- Elemento AI (Punto luce ciano medicale in basso a sinistra) -->
  <circle cx="15" cy="38" r="1.5" fill="#00f2fe" filter="url(#textGlow)" />
</svg>
